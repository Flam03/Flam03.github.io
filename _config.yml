# -----------------------------------------------------------------------------
# AcademicPages Configuration - Yang Bingzhou (杨秉宙)
# -----------------------------------------------------------------------------

# Basic Site Settings
locale                   : "zh-CN"
site_theme               : "default"
title                    : "Yang Bingzhou (杨秉宙) | Academic Profile"
title_separator          : "-"
name                     : &name "Yang Bingzhou (杨秉宙)"
description              : &description "Researcher at Dalian University of Technology, specializing in Multimodal LLMs and System Security."
url                      : "https://flam03.github.io"
baseurl                  : ""
repository               : "Flam03/Flam03.github.io"

# Site Author Details
author:
  avatar           : "profile.png"
  name             : "Yang Bingzhou (杨秉宙)"
  pronouns         : "he/him"
  # 丰富后的个人简介：突出求实精神与多模态AI研究背景
  bio              : "Dalian University of Technology. Focusing on Multimodal Large Language Models (Cobra) and robust system analysis for geopolitical discourse."
  location         : "Dalian, China"
  employer         : "Dalian University of Technology (DUT)"
  email            : "mailto:ybz19596612@mail.dlut.edu.cn"

  # 学术社交链接 (仅保留有实际意义的项目)
  # googlescholar  : "" # 有链接后填入
  # orcid          : "" # 有链接后填入
  github           : "Flam03"
  # researchgate   : ""

# Publication Categories
publication_category:
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Optimization & SEO
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false

# SEO & Social Preview
social:
  type                   : Person
  name                   : "Bingzhou Yang"
  links:
    - https://github.com/Flam03

# Reading Files & Exclusions
include:
  - .htaccess
  - _pages
  - files
exclude:
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - LICENSE
  - README.md
  - "*.sublime-project"
  - "*.sublime-workspace"

# Collections Configuration
collections:
  teaching:
    output: true
    permalink: /teaching/:path/
  publications:
    output: true
    permalink: /publications/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/
  talks:
    output: true
    permalink: /talks/:path/

# Layout Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Output Settings
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
